services:
  - type: web
    name: kospi-turnaround
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: NODE_ENV=production node dist/index.cjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "20.11.0"
      - key: DART_API_KEY
        value: "34019f9d4f75b3751e3f00fbb0507ba9d3d2f684"
